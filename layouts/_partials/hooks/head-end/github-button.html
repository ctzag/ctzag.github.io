<script async defer src="https://buttons.github.io/buttons.js"></script>

<style>
/* Decrease name font size */
h1 {
  font-size: 1.75rem !important;
  white-space: nowrap !important;
}

/* Force education grid to stay at 2 columns on large screens */
@media (min-width: 1280px) {
  .mb-16 > .grid {
    grid-template-columns: repeat(2, 1fr) !important;
  }
}

/* Justify the biography/summary text */
.bio-text {
  text-align: justify !important;
}

/* ===== Research Section Width Fix ===== */
/* Remove the default prose max-width (65ch) */
.research-section .max-w-prose {
  max-width: none !important;
}

/* Justify research text */
.research-section .prose {
  text-align: justify !important;
}
</style>

<script>
// Dynamically match research section width to biography section content
function matchResearchWidth() {
  // Find the biography section content container (the grid parent)
  var bioSection = document.querySelector('#section-resume-biography-3');
  if (!bioSection) return;

  // Find the innermost content container in the bio section
  var bioContent = bioSection.querySelector('.grid, .mb-16');
  if (!bioContent) {
    // Fallback: find any direct child div that is not the background
    var children = bioSection.children;
    for (var i = 0; i < children.length; i++) {
      if (children[i].className.indexOf('home-section-bg') === -1 && children[i].tagName === 'DIV') {
        bioContent = children[i];
        break;
      }
    }
  }
  if (!bioContent) return;

  var bioWidth = bioContent.getBoundingClientRect().width;

  // Apply the same width to research section containers
  var researchContainers = document.querySelectorAll('.research-section .max-w-prose');
  for (var j = 0; j < researchContainers.length; j++) {
    researchContainers[j].style.setProperty('max-width', bioWidth + 'px', 'important');
  }
}

// Run on load and on resize
window.addEventListener('load', function() {
  setTimeout(matchResearchWidth, 100);
});
window.addEventListener('resize', matchResearchWidth);
</script>
